# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architecture discussion and code review.
  All scoring weights, JD analysis, honeypot rules, title gate logic,
  and semantic design decisions were made by the participant based on
  careful reading of the JD, submission spec, and redrob_signals_doc.
  No candidate data was processed by any LLM during ranking.
  The ranking pipeline runs fully offline (no API calls, no GPU).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Three-phase pipeline. Phase A: honeypot detection (5 rules) + title gate eliminates
  68% of candidates in ~3 s (100K → 32K survivors). Phase B: 8-component weighted
  scoring — title gate (22%), skills depth with 3-pillar combo bonus and recency (26%),
  3-stage hybrid semantic (14%), experience with AI-native company bonus and consulting
  penalty (16%), behavioral signals all 23 with reachability multiplier (12%), career
  narrative with JD-exact production phrases and trajectory scoring (5%), location (3%),
  education + assessment (2%). Phase C: cross-encoder re-rank of top 30 candidates
  (cross-encoder/ms-marco-MiniLM-L-6-v2) to maximise NDCG@10. Key differentiators:
  title gate before skills scoring; 3-pillar combo bonus (Retrieval + Ranking + LLM/Ops);
  AI-native company bonus (+16%); reachability multiplier for low-response-rate candidates;
  JD-exact production phrases (embedding drift, index refresh, retrieval regression);
  career trajectory scoring. 5-rule honeypot detection. Runtime ~195 s CPU-only.

