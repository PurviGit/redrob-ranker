ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architecture discussion and code review.
  All scoring weights, JD analysis, honeypot rules, title gate logic,
  and semantic design decisions were made by the participant based on
  careful reading of the JD, submission spec, and redrob_signals_doc.
  No candidate data was processed by any LLM during ranking.
  The ranking pipeline runs fully offline (no API calls, no GPU).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Three-stage pipeline. Phase A: fast pre-filter (honeypot detection + title gate)
  eliminates 68% of candidates in 3 seconds — reducing 100K to ~32K survivors.
  Phase B: 8-component weighted scoring on survivors only.
  Components: title gate (22%), skills depth (26%), hybrid semantic — TF-IDF
  all candidates + bi-encoder re-rank top 500 via all-MiniLM-L6-v2 (14%), experience quality (16%),
  behavioral signals — all 23 (12%), career narrative production-evidence regex (5%),
  location (3%), education + assessment (2%). Weights sum to 1.0.
  Phase C: Cross-encoder re-rank of top 30 (cross-encoder/ms-marco-MiniLM-L-6-v2) to
  maximise NDCG@10. Blended 60/40 composite vs cross-encoder, rescaled to maintain monotonicity.
  Title gate scored BEFORE skills — an HR Manager with 9 AI skills scores 0.04.
  Consulting-firm penalty (−35% for TCS/Infosys/Wipro full career).
  Product company bonus (+10%). 5-rule honeypot detection. Runtime ~177 s CPU.

